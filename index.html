<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VLSI Attendance</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white;
            padding: 30px 20px;
            text-align: center;
        }

        .header h1 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 10px;
        }

        .header p {
            opacity: 0.9;
            font-size: 16px;
        }

        .controls {
            padding: 20px;
            border-bottom: 1px solid #eee;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 12px 20px;
            border: none;
            border-radius: 25px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-secondary {
            background: #f8f9fa;
            color: #495057;
            border: 2px solid #dee2e6;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .student-list {
            max-height: 400px;
            overflow-y: auto;
        }

        .student-item {
            display: flex;
            align-items: center;
            padding: 15px 20px;
            border-bottom: 1px solid #f0f0f0;
            transition: background-color 0.2s ease;
        }

        .student-item:hover {
            background-color: #f8f9ff;
        }

        .student-item:last-child {
            border-bottom: none;
        }

        .checkbox-wrapper {
            position: relative;
            margin-right: 15px;
        }

        .checkbox {
            width: 24px;
            height: 24px;
            border: 2px solid #ddd;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .checkbox.checked {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            border-color: #4facfe;
        }

        .checkbox.checked::after {
            content: '✓';
            color: white;
            font-weight: bold;
            font-size: 14px;
        }

        .student-info {
            flex: 1;
        }

        .student-name {
            font-weight: 600;
            font-size: 16px;
            color: #333;
            margin-bottom: 4px;
        }

        .student-roll {
            color: #666;
            font-size: 14px;
        }

        .selected-count {
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%);
            color: #333;
            padding: 15px 20px;
            text-align: center;
            font-weight: 600;
        }

        .generate-section {
            padding: 20px;
            text-align: center;
        }

        .btn-generate {
            background: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%);
            color: #333;
            width: 100%;
            margin-bottom: 15px;
            padding: 15px;
            font-size: 16px;
        }

        .output-section {
            margin-top: 20px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 10px;
            display: none;
        }

        .output-text {
            background: white;
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 15px;
            font-family: monospace;
            font-size: 14px;
            line-height: 1.6;
            white-space: pre-line;
            max-height: 200px;
            overflow-y: auto;
            margin-bottom: 15px;
        }

        .btn-copy {
            background: linear-gradient(135deg, #84fab0 0%, #8fd3f4 100%);
            color: #333;
            width: 100%;
            margin-bottom: 10px;
        }

        .btn-share {
            background: linear-gradient(135deg, #ffecd2 0%, #fcb69f 100%);
            color: #333;
            width: 100%;
        }

        .btn-pdf {
            background: linear-gradient(135deg, #d4fc79 0%, #96e6a1 100%);
            color: #333;
            padding: 10px 16px;
            font-size: 12px;
            margin-bottom: 10px;
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #666;
        }

        .search-box {
            width: 100%;
            padding: 15px 20px;
            border: none;
            border-bottom: 2px solid #eee;
            font-size: 16px;
            outline: none;
            transition: border-color 0.3s ease;
        }

        .search-box:focus {
            border-color: #4facfe;
        }

        @media (max-width: 480px) {
            .container {
                margin: 0;
                border-radius: 0;
                min-height: 100vh;
            }
            
            .controls {
                flex-direction: column;
            }
            
            .btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>VLSI Attendance Tracker</h1>
            <p>Select students to mark attendance</p>
        </div>

        <div class="controls">
            <button class="btn btn-secondary" onclick="selectAll()">Select All</button>
            <button class="btn btn-secondary" onclick="clearAll()">Clear All</button>
        </div>

        <input type="text" class="search-box" placeholder="Search students..." oninput="filterStudents(this.value)">

        <div class="student-list" id="studentList">
            <!-- Students will be populated here -->
        </div>

        <div class="selected-count" id="selectedCount">
            0 students selected
        </div>

        <div class="generate-section">

            </button>

            <div class="output-section" id="outputSection">
                <div class="output-text" id="outputText"></div>

                <button class="btn btn-copy" onclick="copyToClipboard()">

                <button class="btn btn-share" onclick="shareAttendance()">

        const PDF_BLOB_REVOKE_DELAY_MS = 2 * 60 * 1000;
        const A4_PAGE_WIDTH_MM = 210;
        const A4_PAGE_HEIGHT_MM = 297;

        let selectedStudents = new Set();
        let filteredStudents = [...students];

        function renderStudents() {
            const listContainer = document.getElementById('studentList');
            
            if (filteredStudents.length === 0) {
                listContainer.innerHTML = '<div class="empty-state">No students found</div>';
                return;
            }

            listContainer.innerHTML = filteredStudents.map((student, index) => `
                <div class="student-item" onclick="toggleStudent('${student.rollNo}')">
                    <div class="checkbox-wrapper">
                        <div class="checkbox ${selectedStudents.has(student.rollNo) ? 'checked' : ''}" 
                             id="checkbox-${student.rollNo}"></div>
                    </div>
                    <div class="student-info">
                        <div class="student-name">${student.name}</div>
                        <div class="student-roll">Roll No: ${student.rollNo}</div>
                    </div>
                </div>
            `).join('');

            updateSelectedCount();
        }

        function toggleStudent(rollNo) {
            if (selectedStudents.has(rollNo)) {
                selectedStudents.delete(rollNo);
            } else {
                selectedStudents.add(rollNo);
            }
            
            const checkbox = document.getElementById(`checkbox-${rollNo}`);
            checkbox.classList.toggle('checked');
            updateSelectedCount();
        }

        function updateSelectedCount() {
            const count = selectedStudents.size;
            document.getElementById('selectedCount').textContent = 
                `${count} student${count !== 1 ? 's' : ''} selected`;
        }

        function selectAll() {
            filteredStudents.forEach(student => {
                selectedStudents.add(student.rollNo);
            });
            renderStudents();
        }

        function clearAll() {
            selectedStudents.clear();
            renderStudents();
            document.getElementById('outputSection').style.display = 'none';
        }

        function filterStudents(searchTerm) {
            const term = searchTerm.toLowerCase();
            filteredStudents = students.filter(student => 
                student.name.toLowerCase().includes(term) || 
                student.rollNo.toLowerCase().includes(term)
            );
            renderStudents();
        }

        function generateAttendance() {
            if (selectedStudents.size === 0) {
                alert('Please select at least one student');
                return;
            }

            const selectedStudentsList = getSelectedStudentsList();

            const attendanceText = selectedStudentsList
                .map(student => `${student.name} (${student.rollNo})`)
                .join('\n');

            document.getElementById('outputText').textContent = attendanceText;
            document.getElementById('outputSection').style.display = 'block';
        }

        function getSelectedStudentsList() {
            return students.filter(student => selectedStudents.has(student.rollNo));
        }

        function getFormattedDate() {
            const today = new Date();
            const day = String(today.getDate()).padStart(2, '0');
            const month = String(today.getMonth() + 1).padStart(2, '0');
            const year = String(today.getFullYear()).slice(-2);
            return `${day}.${month}.${year}`;
        }

        function truncateTextToWidth(doc, text, maxWidth) {
            if (doc.getTextWidth(text) <= maxWidth) {
                return text;
            }

            let truncated = text;
            while (truncated.length > 0 && doc.getTextWidth(`${truncated}...`) > maxWidth) {
                truncated = truncated.slice(0, -1);
            }
            return `${truncated}...`;
        }

            modal.innerHTML = `

                    </label>

                    </label>

                    </label>

                            id="cancelPdfOptions"
                            style="

                                border: none;
                                border-radius: 10px;
                                padding: 10px 12px;
                                background: #f0f0f0;
                                color: #333;

                                cursor: pointer;

                        </button>

                            id="confirmPdfOptions"

        function generateAttendancePdf(options = {}) {
            const selectedStudentsList = getSelectedStudentsList();
            const customTitle = typeof options.customTitle === 'string' ? options.customTitle.trim() : '';
            const includeRollNo = options.includeRollNo !== false;

            if (selectedStudentsList.length === 0) {
                alert('Please select at least one student');
                return;
            }

            if (!window.jspdf || !window.jspdf.jsPDF) {
                alert('Unable to load PDF library. Please check your internet connection or try again later.');
                return;
            }

            const { jsPDF } = window.jspdf;
            const doc = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });
            const startY = customTitle ? 24 : 14;
            const lineHeight = 6;
            const marginX = 10;
            const gap = 8;
            const bottomMargin = 10;
            const colWidth = (A4_PAGE_WIDTH_MM - (marginX * 2) - gap) / 2;
            const maxRows = Math.floor((A4_PAGE_HEIGHT_MM - startY - bottomMargin) / lineHeight);
            const maxStudentsPerPage = maxRows * 2;
            const splitIndex = Math.ceil(selectedStudentsList.length / 2);

            if (splitIndex > maxRows) {
                const studentsToDeselect = selectedStudentsList.length - maxStudentsPerPage;
                alert(`Cannot generate PDF: ${selectedStudentsList.length} students selected exceeds the one-page limit of ${maxStudentsPerPage}. Please deselect at least ${studentsToDeselect} student(s).`);
                return;
            }

            if (customTitle) {
                doc.setFont('helvetica', 'bold');
                doc.setFontSize(12);
                doc.text(customTitle, A4_PAGE_WIDTH_MM / 2, 14, { align: 'center' });
            }

            doc.setFont('helvetica', 'normal');
            doc.setFontSize(8);

            const formatEntry = (student, serialNumber) => {
                if (includeRollNo) {
                    return `${serialNumber}. ${student.name} (${student.rollNo})`;
                }
                return `${serialNumber}. ${student.name}`;
            };

            for (let i = 0; i < splitIndex; i++) {
                const y = startY + (i * lineHeight);
                const leftText = formatEntry(selectedStudentsList[i], i + 1);
                doc.text(truncateTextToWidth(doc, leftText, colWidth), marginX, y);

                const rightIndex = i + splitIndex;
                if (rightIndex < selectedStudentsList.length) {
                    const rightText = formatEntry(selectedStudentsList[rightIndex], rightIndex + 1);
                    doc.text(
                        truncateTextToWidth(doc, rightText, colWidth),
                        marginX + colWidth + gap,
                        y
                    );
                }
            }

            const formattedDate = getFormattedDate();
            const shareTitle = customTitle || `Attendance - ${formattedDate}`;
            const fileName = `attendance-${formattedDate}.pdf`;
            const pdfBlob = doc.output('blob');
            sharePdfFile(pdfBlob, fileName, shareTitle);
        }

        function sharePdfFile(pdfBlob, fileName, shareTitle) {
            const pdfFile = typeof File !== 'undefined'
                ? new File([pdfBlob], fileName, { type: 'application/pdf' })
                : null;

            if (
                pdfFile &&
                navigator.share &&
                navigator.canShare &&
                navigator.canShare({ files: [pdfFile] })
            ) {
                navigator.share({
                    title: shareTitle,
                    files: [pdfFile]
                }).catch((error) => {
                    if (error?.name !== 'AbortError') {
                        console.warn('PDF share failed, opening file instead:', error);
                        openOrDownloadPdf(pdfBlob, fileName);
                    }
                });
                return;
            }

            openOrDownloadPdf(pdfBlob, fileName);
        }

        function openOrDownloadPdf(pdfBlob, fileName) {
            const blobUrl = URL.createObjectURL(pdfBlob);
            const openedWindow = window.open(blobUrl, '_blank');

            if (!openedWindow) {
                const link = document.createElement('a');
                link.href = blobUrl;
                link.download = fileName;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            }

            setTimeout(() => URL.revokeObjectURL(blobUrl), PDF_BLOB_REVOKE_DELAY_MS);
        }

        function copyToClipboard() {
            const outputText = document.getElementById('outputText');
            const textToCopy = outputText.textContent;

            // Try to use the modern clipboard API
            if (navigator.clipboard && window.isSecureContext) {
                navigator.clipboard.writeText(textToCopy).then(() => {
                    showCopySuccess();
                }).catch(() => {
                    fallbackCopyTextToClipboard(textToCopy);
                });
            } else {
                fallbackCopyTextToClipboard(textToCopy);
            }
        }

        function fallbackCopyTextToClipboard(text) {
            const textArea = document.createElement("textarea");
            textArea.value = text;
            textArea.style.position = "fixed";
            textArea.style.left = "-999999px";
            textArea.style.top = "-999999px";
            document.body.appendChild(textArea);
            textArea.focus();
            textArea.select();
            
            try {
                document.execCommand('copy');
                showCopySuccess();
            } catch (err) {
                alert('Failed to copy text. Please select and copy manually.');
            }
            
            document.body.removeChild(textArea);
        }

        function showCopySuccess() {
            const copyBtn = document.querySelector('.btn-copy');
            const originalText = copyBtn.textContent;
            copyBtn.textContent = '✅ Copied!';
            copyBtn.style.background = 'linear-gradient(135deg, #90EE90 0%, #98FB98 100%)';
            
            setTimeout(() => {
                copyBtn.textContent = originalText;
                copyBtn.style.background = 'linear-gradient(135deg, #84fab0 0%, #8fd3f4 100%)';
            }, 2000);
        }

        function shareAttendance() {
            const outputText = document.getElementById('outputText');
            const attendanceText = outputText.textContent;
            
            if (!attendanceText) {
                alert('No attendance data to share');
                return;
            }

            const formattedDate = getFormattedDate();
            const shareTitle = `Attendance - ${formattedDate}`;
            const shareText = `${shareTitle}\n\n${attendanceText}`;

            // Check if Web Share API is supported
            if (navigator.share && navigator.canShare) {
                navigator.share({
                    title: shareTitle,
                    text: shareText
                }).then(() => {
                    console.log('Attendance shared successfully');
                }).catch((error) => {
                    console.log('Error sharing:', error);
                    fallbackShare(shareText);
                });
            } else {
                fallbackShare(shareText);
            }
        }

        function fallbackShare(text) {
            // For devices that don't support Web Share API
            // Create WhatsApp and email links
            const encodedText = encodeURIComponent(text);
            
            // Create a modal with sharing options
            const modal = document.createElement('div');
            modal.style.cssText = `
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                background: rgba(0,0,0,0.5);
                display: flex;
                align-items: center;
                justify-content: center;
                z-index: 1000;
            `;
            
            modal.innerHTML = `
                <div style="
                    background: white;
                    border-radius: 15px;
                    padding: 30px;
                    max-width: 300px;
                    width: 90%;
                    text-align: center;
                ">
                    <h3 style="margin-bottom: 20px; color: #333;">Share Attendance</h3>
                    <div style="display: flex; flex-direction: column; gap: 10px;">
                        <a href="https://wa.me/?text=${encodedText}" 
                           target="_blank" 
                           onclick="closeModal()"
                           style="
                               background: #25D366;
                               color: white;
                               padding: 12px 20px;
                               text-decoration: none;
                               border-radius: 25px;
                               font-weight: 600;
                           ">
                            📱 Share via WhatsApp
                        </a>
                        <a href="mailto:?subject=Attendance%20Report&body=${encodedText}" 
                           onclick="closeModal()"
                           style="
                               background: #EA4335;
                               color: white;
                               padding: 12px 20px;
                               text-decoration: none;
                               border-radius: 25px;
                               font-weight: 600;
                           ">
                            📧 Share via Email
                        </a>
                        <button onclick="copyAndClose('${text.replace(/'/g, "\\'")}')" 
                                style="
                                    background: #4267B2;
                                    color: white;
                                    padding: 12px 20px;
                                    border: none;
                                    border-radius: 25px;
                                    font-weight: 600;
                                    cursor: pointer;
                                ">
                            📋 Copy to Share
                        </button>
                        <button onclick="closeModal()" 
                                style="
                                    background: #f0f0f0;
                                    color: #333;
                                    padding: 12px 20px;
                                    border: none;
                                    border-radius: 25px;
                                    font-weight: 600;
                                    cursor: pointer;
                                    margin-top: 10px;
                                ">
                            Cancel
                        </button>
                    </div>
                </div>
            `;
            
            document.body.appendChild(modal);
            
            // Close modal when clicking outside
            modal.addEventListener('click', (e) => {
                if (e.target === modal) {
                    closeModal();
                }
            });
            
            window.closeModal = () => {
                document.body.removeChild(modal);
            };
            
            window.copyAndClose = (text) => {
                copyTextToClipboard(text);
                closeModal();
            };
        }

        function copyTextToClipboard(text) {
            if (navigator.clipboard && window.isSecureContext) {
                navigator.clipboard.writeText(text).then(() => {
                    alert('Attendance copied! You can now paste it in any app.');
                });
            } else {
                const textArea = document.createElement("textarea");
                textArea.value = text;
                textArea.style.position = "fixed";
                textArea.style.left = "-999999px";
                document.body.appendChild(textArea);
                textArea.select();
                document.execCommand('copy');
                document.body.removeChild(textArea);
                alert('Attendance copied! You can now paste it in any app.');
            }
        }

        // Initialize the app
        renderStudents();
    </script>
</body>
</html>
